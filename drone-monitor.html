<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机/机巢实况 - 实况中心 - Avant Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #141414;
            color: #d4d4d4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 13px;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .video-cell {
            border: 1px solid #2d2d2d;
            background: #000;
            position: relative;
        }
        .video-cell.active {
            border-color: #58a6ff;
        }
        
        .tab-btn { border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

        /* Layout Styles */
        .layout-container {
            flex: 1;
            position: relative;
            min-height: 0;
            border: 1px solid #2d2d2d;
            background: #000;
            border-radius: 0.25rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        /* 1. 画中画 (PiP) - 默认 */
        .layout-pip .vid-main { position: absolute; inset: 0; z-index: 1; }
        .layout-pip .vid-sub1 { position: absolute; bottom: 1rem; left: 1rem; width: 16rem; aspect-ratio: 16/9; z-index: 10; border: 2px solid #333; border-radius: 0.25rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); cursor: pointer; transition: border-color 0.2s; }
        .layout-pip .vid-sub1:hover { border-color: #58a6ff; }
        .layout-pip .vid-sub2 { position: absolute; bottom: 1rem; right: 1rem; width: 16rem; aspect-ratio: 16/9; z-index: 10; border: 2px solid #333; border-radius: 0.25rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); cursor: pointer; transition: border-color 0.2s; }
        .layout-pip .vid-sub2:hover { border-color: #58a6ff; }
        .layout-pip .vid-sub3 { display: none; }

        /* 2. 单屏 (Single) */
        .layout-single .vid-main { position: absolute; inset: 0; z-index: 1; }
        .layout-single .vid-sub1, .layout-single .vid-sub2, .layout-single .vid-sub3 { display: none; }

        /* 3. 三分屏 (Split 3) */
        .layout-split3 { display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; background: #2d2d2d; border: none; border-radius: 0; }
        .layout-split3 > div { position: relative; width: 100%; height: 100%; border: none; border-radius: 0; box-shadow: none; }
        .layout-split3 .vid-main { grid-column: 1 / 2; grid-row: 1 / 3; }
        .layout-split3 .vid-sub1 { grid-column: 2 / 3; grid-row: 1 / 2; }
        .layout-split3 .vid-sub2 { grid-column: 2 / 3; grid-row: 2 / 3; }
        .layout-split3 .vid-sub3 { display: none; }

        /* 4. 四分屏 (Split 4) */
        .layout-split4 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; background: #2d2d2d; border: none; border-radius: 0; }
        .layout-split4 > div { position: relative; width: 100%; height: 100%; border: none; border-radius: 0; box-shadow: none; }
        .layout-split4 .vid-main { grid-column: 1 / 2; grid-row: 1 / 2; }
        .layout-split4 .vid-sub1 { grid-column: 2 / 3; grid-row: 1 / 2; }
        .layout-split4 .vid-sub2 { grid-column: 1 / 2; grid-row: 2 / 3; }
        .layout-split4 .vid-sub3 { grid-column: 2 / 3; grid-row: 2 / 3; display: block; }

    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 顶部导航 -->
    <header class="h-12 bg-[#1e1e1e] border-b border-[#2d2d2d] flex items-center justify-between px-4 shrink-0 z-20">
        <div class="flex items-center space-x-2 text-sm text-gray-400">
            <a href="javascript:history.back()" class="hover:text-white transition-colors flex items-center">
                <i class="fas fa-arrow-left mr-3 text-lg"></i>
            </a>
            <a href="project-home.html" class="hover:text-white transition-colors">项目首页</a>
            <span>/</span>
            <span class="text-white">监控中心</span>
        </div>
        
        <div class="flex items-center space-x-3">
            <i class="fas fa-bell text-gray-400 hover:text-white cursor-pointer ml-2"></i>
            <div class="w-6 h-6 rounded-full bg-gray-600 flex items-center justify-center text-xs text-white cursor-pointer">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <!-- 监控中心二级导航 -->
    <div class="bg-[#1e1e1e] border-b border-[#2d2d2d] px-4 flex space-x-8 text-sm shrink-0">
        <div class="py-3 text-[#58a6ff] border-b-2 border-[#58a6ff] font-medium cursor-pointer flex items-center">
            <i class="fas fa-plane mr-2"></i> 无人机/机巢实况
        </div>
        <div class="py-3 text-gray-400 hover:text-gray-200 cursor-pointer flex items-center" onclick="location.href='camera-monitor.html'">
            <i class="fas fa-video mr-2"></i> 摄像头监控
        </div>
    </div>

    <!-- 主体内容 -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- 左侧设备树 -->
        <div class="w-64 bg-[#141414] border-r border-[#2d2d2d] flex flex-col shrink-0">
            <div class="p-2">
                <div class="relative">
                    <input type="text" placeholder="搜索机巢/无人机名称" class="w-full bg-[#1e1e1e] border border-[#333] text-xs rounded pl-8 pr-3 py-1.5 focus:outline-none focus:border-[#58a6ff] text-white">
                    <i class="fas fa-search absolute left-2.5 top-2 text-gray-500 text-xs"></i>
                </div>
            </div>
            <div class="p-2 flex-1 overflow-y-auto custom-scrollbar">
                <!-- 机巢节点 1 -->
                <div class="mb-2">
                    <div class="flex items-center px-2 py-1.5 text-xs text-gray-300 hover:bg-[#1e1e1e] rounded cursor-pointer" onclick="document.getElementById('node1').classList.toggle('hidden')">
                        <i class="fas fa-caret-down w-4 text-center mr-1 text-gray-500"></i>
                        <i class="fas fa-box text-gray-400 mr-2"></i>
                        <span class="truncate font-medium text-white">007机巢576号677</span>
                        <span class="ml-auto text-[10px] text-[#3fb950]">在线</span>
                    </div>
                    <!-- 子节点 -->
                    <div id="node1" class="pl-6 pr-2 mt-1 space-y-1">
                        <div class="flex items-center px-2 py-1.5 text-xs bg-[#1f6feb]/20 text-[#58a6ff] rounded cursor-pointer border border-[#1f6feb]/30">
                            <i class="fas fa-plane mr-2"></i>
                            <span class="truncate">无人机 M30T</span>
                        </div>
                        <div class="flex items-center px-2 py-1.5 text-xs text-gray-400 hover:bg-[#1e1e1e] rounded cursor-pointer">
                            <i class="fas fa-video mr-2"></i>
                            <span class="truncate">机巢内监控</span>
                        </div>
                        <div class="flex items-center px-2 py-1.5 text-xs text-gray-400 hover:bg-[#1e1e1e] rounded cursor-pointer">
                            <i class="fas fa-video mr-2"></i>
                            <span class="truncate">机巢外监控</span>
                        </div>
                    </div>
                </div>

                <!-- 机巢节点 2 -->
                <div class="mb-2">
                    <div class="flex items-center px-2 py-1.5 text-xs text-gray-300 hover:bg-[#1e1e1e] rounded cursor-pointer" onclick="document.getElementById('node2').classList.toggle('hidden')">
                        <i class="fas fa-caret-right w-4 text-center mr-1 text-gray-500"></i>
                        <i class="fas fa-box text-gray-400 mr-2"></i>
                        <span class="truncate font-medium">J89</span>
                        <span class="ml-auto text-[10px] text-[#3fb950]">在线</span>
                    </div>
                    <div id="node2" class="pl-6 pr-2 mt-1 space-y-1 hidden">
                        <div class="flex items-center px-2 py-1.5 text-xs text-gray-400 hover:bg-[#1e1e1e] rounded cursor-pointer">
                            <i class="fas fa-plane mr-2"></i>
                            <span class="truncate">无人机 M300</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧主监控区 -->
        <div class="flex-1 flex flex-col bg-[#0d1117] min-w-0">
            
            <!-- 视频分屏区 -->
            <div class="flex-1 flex flex-col p-2 min-w-0">
                <!-- 工具栏 -->
                <div class="flex justify-between items-center mb-2 px-1 shrink-0">
                    <div class="flex space-x-1 bg-[#1e1e1e] rounded border border-[#2d2d2d] p-0.5" id="layout-controls">
                        <button class="w-8 h-7 flex items-center justify-center rounded text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition-colors layout-btn" title="单屏" onclick="setDroneLayout('single', this)"><i class="fas fa-square"></i></button>
                        <button class="w-8 h-7 flex items-center justify-center rounded bg-[#333] text-white transition-colors layout-btn" title="画中画" onclick="setDroneLayout('pip', this)"><i class="fas fa-object-ungroup"></i></button>
                        <button class="w-8 h-7 flex items-center justify-center rounded text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition-colors layout-btn" title="三分屏" onclick="setDroneLayout('split3', this)"><i class="fas fa-columns"></i></button>
                        <button class="w-8 h-7 flex items-center justify-center rounded text-gray-400 hover:text-white hover:bg-[#2d2d2d] transition-colors layout-btn" title="四分屏" onclick="setDroneLayout('split4', this)"><i class="fas fa-th-large"></i></button>
                    </div>
                    <div class="flex items-center space-x-4 text-xs text-gray-300">
                        <span class="flex items-center"><i class="fas fa-signal text-[#3fb950] mr-1"></i> 图传: 良好</span>
                        <span class="flex items-center"><i class="fas fa-battery-half text-[#d29922] mr-1"></i> 电量: 45%</span>
                        <button class="px-3 py-1.5 bg-[#1e1e1e] border border-[#2d2d2d] rounded hover:text-white hover:bg-[#252525] transition-colors">
                            <i class="fas fa-expand mr-1"></i> 全屏
                        </button>
                    </div>
                </div>

                <!-- 动态布局容器 -->
                <div id="drone-video-container" class="layout-container layout-pip">
                    <!-- 主画面 (无人机 FPV) -->
                    <div class="vid-main bg-black flex items-center justify-center overflow-hidden group">
                        <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover opacity-90" alt="无人机图传">
                        <div class="absolute top-2 left-2 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded hidden group-[.layout-split3]:block group-[.layout-split4]:block">无人机 M30T</div>
                        <!-- OSD 飞行数据 -->
                        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-6 text-white text-sm font-mono drop-shadow-md bg-black/40 px-4 py-1.5 rounded-full backdrop-blur">
                            <span>ALT: 120m</span>
                            <span>SPD: 12.5m/s</span>
                            <span>DIST: 1.2km</span>
                            <span class="text-[#f85149]">REC 00:12:45</span>
                        </div>
                    </div>
                    
                    <!-- 画中画 1 / 分屏 2 (机巢内) -->
                    <div class="vid-sub1 bg-black flex items-center justify-center overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover opacity-60 grayscale">
                        <div class="absolute top-1 left-1 bg-black/60 text-white text-[9px] px-1 rounded">机巢内监控</div>
                    </div>

                    <!-- 画中画 2 / 分屏 3 (地图) -->
                    <div class="vid-sub2 bg-[#1e1e1e] flex items-center justify-center overflow-hidden">
                        <i class="fas fa-map-marked-alt text-gray-500 text-3xl"></i>
                        <div class="absolute top-1 left-1 bg-black/60 text-white text-[9px] px-1 rounded">二维地图</div>
                    </div>
                    
                    <!-- 隐藏的第4路 (用于四分屏: 机巢外监控) -->
                    <div class="vid-sub3 bg-black flex items-center justify-center overflow-hidden hidden">
                        <div class="absolute inset-0 w-full h-full bg-gradient-to-br from-gray-800 to-gray-900 filter grayscale contrast-150"></div>
                        <div class="absolute top-1 left-1 bg-black/60 text-white text-[9px] px-1 rounded">机巢外监控</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function setDroneLayout(layoutType, btnElement) {
            // 1. 更新按钮样式
            const buttons = document.querySelectorAll('#layout-controls .layout-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-[#333]', 'text-white');
                btn.classList.add('text-gray-400');
            });
            btnElement.classList.remove('text-gray-400');
            btnElement.classList.add('bg-[#333]', 'text-white');

            // 2. 更新容器类名以触发 CSS 布局切换
            const container = document.getElementById('drone-video-container');
            container.className = `layout-container layout-${layoutType}`;
        }
    </script>
</body>
</html>
